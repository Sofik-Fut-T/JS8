<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSofStore - Лабораторна робота 8</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="custom-nav">
        <div class="logo">DeSofStore</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        
        <ul id="nav-menu">
            <li><a href="index.html">🏠 Головна</a></li>
            <li><a href="#" onclick="loadCatalog(event)">📦 Каталог</a></li>
            <li><a href="#" onclick="loadSpecials(event)">⭐ Specials</a></li>
        </ul>
    </nav>

    <div id="content">
        <div id="main-content">
            
            <div class="carousel-container">
                <div class="carousel-slide" id="slider">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800&h=400&fit=crop" alt="Ноутбуки та технології">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&h=400&fit=crop" alt="Кіберпанк стиль">
                    <img src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5?w=800&h=400&fit=crop" alt="Ігрова периферія">
                </div>
                <button class="prev-btn" onclick="moveSlide(-1)">❮</button>
                <button class="next-btn" onclick="moveSlide(1)">❯</button>
            </div>

            <div class="responsive-images">
                <h3 class="responsive-title">Демонстрація адаптивних картинок:</h3>
                
                <div class="large-only">
                    <img src="https://placehold.co/600x200/005500/FFF?text=Large+Screen+Only+1" alt="Large 1">
                    <img src="https://placehold.co/600x200/000055/FFF?text=Large+Screen+Only+2" alt="Large 2">
                </div>

                <div class="medium-only">
                    <img src="https://placehold.co/300x150/550000/FFF?text=Medium+Screen+Only+1" alt="Medium 1">
                    <img src="https://placehold.co/300x150/555500/FFF?text=Medium+Screen+Only+2" alt="Medium 2">
                </div>
            </div>

            <div class="hero-container text-center">
                <button class="hero-btn" onclick="loadCatalog(event)">
                    Відкрити каталог товарів
                </button>
            </div>

        </div> 
    </div> 
    
    <script src="js/script.js"></script>
</body>
</html>
